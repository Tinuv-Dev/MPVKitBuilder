name: Verify libplacebo Mac Catalyst

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/verify-libplacebo-maccatalyst.yml
      - Package.swift
      - Sources/MPVKitBuilder/Builders/**
      - Sources/MPVKitBuilder/Core/**
      - Sources/MPVKitBuilder/Domain/**
      - Sources/MPVKitBuilder/LibBuilders/LibLcms2Builder.swift
      - Sources/MPVKitBuilder/LibBuilders/LibPlaceboBuilder.swift
      - Sources/MPVKitBuilder/LibBuilders/LibShadercBuilder.swift

concurrency:
  group: verify-libplacebo-maccatalyst-${{ github.ref }}
  cancel-in-progress: true

jobs:
  libplacebo-maccatalyst:
    name: libplacebo maccatalyst arm64
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Free disk (drop unused Xcodes)
        run: |
          SELECTED=$(xcode-select -p)
          KEEP=$(dirname "$(dirname "$SELECTED")")
          echo "keeping $KEEP"
          for app in /Applications/Xcode*.app; do
            if [ "$app" != "$KEEP" ]; then
              echo "removing $app"
              sudo rm -rf "$app"
            fi
          done

      - name: Export selected Xcode
        run: |
          DEVELOPER_DIR=$(xcode-select -p)
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version

      - name: First launch
        run: |
          sudo xcodebuild -runFirstLaunch
          xcodebuild -checkFirstLaunchStatus
          xcrun --kill-cache

      - name: Probe Mac Catalyst SDK
        run: |
          xcodebuild -showsdks
          xcrun --no-cache --sdk macosx --show-sdk-path
          xcrun --no-cache --sdk macosx --show-sdk-platform-path

      - name: Install build tools
        run: |
          brew update
          brew install cmake meson ninja pkg-config autoconf automake libtool python-setuptools
          python3 -m pip install jinja2 --break-system-packages

      - name: Prepare Vulkan headers
        run: |
          set -euo pipefail
          VULKAN_HEADERS_TAG=v1.3.296
          ARCHIVE="$RUNNER_TEMP/vulkan-headers.tar.gz"
          EXTRACT="$RUNNER_TEMP/vulkan-headers"

          curl -fL --retry 3 --connect-timeout 30 \
            -o "$ARCHIVE" \
            "https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/${VULKAN_HEADERS_TAG}.tar.gz"

          mkdir -p "$EXTRACT" prebuilt-vulkan/include prebuilt-vulkan/share/vulkan/registry
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -R "$EXTRACT/include/vulkan" prebuilt-vulkan/include/
          cp "$EXTRACT/registry/vk.xml" prebuilt-vulkan/share/vulkan/registry/vk.xml

          test -f prebuilt-vulkan/include/vulkan/vulkan.h
          test -s prebuilt-vulkan/share/vulkan/registry/vk.xml

      - name: Build libplacebo Mac Catalyst
        env:
          PREBUILT_VULKAN: ${{ github.workspace }}/prebuilt-vulkan
        run: |
          set -euo pipefail
          swift run --package-path . MPVKitBuilder build \
            only=libplacebo \
            platform=maccatalyst \
            arch=arm64 \
            split-platform \
            clean-after-lib \
            disable-package \
            disable-gpl \
            force=libplacebo \
            prebuilt-vulkan="$PREBUILT_VULKAN" \
            verbose

      - name: Verify output
        run: |
          set -euo pipefail
          FRAMEWORK="dist-platform/maccatalyst/libplacebo.framework"
          test -d "$FRAMEWORK"
          test -f "$FRAMEWORK/libplacebo"
          test -d "$FRAMEWORK/Headers"
          find "$FRAMEWORK" -maxdepth 3 -type f | sort
          lipo -info "$FRAMEWORK/libplacebo"

      - name: Disk after build
        if: always()
        run: |
          df -h
          du -sh build dist dist-platform .build/reports 2>/dev/null || true

      - name: Upload libplacebo framework
        uses: actions/upload-artifact@v4
        with:
          name: libplacebo-maccatalyst-${{ github.run_number }}
          path: dist-platform/maccatalyst/libplacebo.framework
          retention-days: 7

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libplacebo-maccatalyst-reports-${{ github.run_number }}
          path: .build/reports
          retention-days: 7
