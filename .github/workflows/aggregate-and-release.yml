name: Aggregate & Release

on:
  workflow_dispatch:
    inputs:
      vulkan_run_id:
        description: 'Run ID of the Prebuild Vulkan run whose artifact to consume (the number after /actions/runs/). A vulkan-prebuilt artifact ID or artifact URL is also accepted.'
        type: string
        required: true
      slice_run_ids:
        description: 'Comma-separated list of "platform:run_id" pairs (e.g. "ios:1234567890,macos:1234567891"). Each platform is fetched from the matching Build Platform run.'
        type: string
        required: true
      package_platforms:
        description: 'Optional comma-separated platform list for generated Package.swift. Defaults to the platforms in slice_run_ids.'
        type: string
        required: false
      tag:
        description: 'Optional tag/name for the GitHub Release. Defaults to MPVKit-YYYYMMDD-HHMM.'
        type: string
        required: false

permissions:
  actions: read
  contents: write

jobs:
  aggregate:
    name: aggregate xcframeworks
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Download prebuilt vulkan
        env:
          REPO: ${{ github.repository }}
          VULKAN_INPUT: ${{ inputs.vulkan_run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p vulkan-archive

          input_id="${VULKAN_INPUT%/}"
          case "$input_id" in
            */actions/runs/*)
              RUN_ID="${input_id#*/actions/runs/}"
              RUN_ID="${RUN_ID%%/*}"
              ARTIFACT_ID=""
              ;;
            */artifacts/*)
              ARTIFACT_ID="${input_id#*/artifacts/}"
              ARTIFACT_ID="${ARTIFACT_ID%%/*}"
              RUN_ID=""
              ;;
            *)
              RUN_ID="$input_id"
              ARTIFACT_ID="$input_id"
              ;;
          esac

          artifact_for_run() {
            gh api "repos/$REPO/actions/runs/$1/artifacts?per_page=100" \
              --jq '.artifacts[].name' 2>/dev/null \
              | while IFS= read -r name; do
                  case "$name" in
                    vulkan-prebuilt-*)
                      printf '%s\n' "$name"
                      break
                      ;;
                  esac
                done
          }

          ARTIFACT=""
          if [ -n "$RUN_ID" ]; then
            ARTIFACT=$(artifact_for_run "$RUN_ID" || true)
          fi

          if [ -z "$ARTIFACT" ] && [ -n "$ARTIFACT_ID" ]; then
            ARTIFACT_INFO=$(gh api "repos/$REPO/actions/artifacts/$ARTIFACT_ID" \
              --jq '[.workflow_run.id, .name] | @tsv' 2>/dev/null || true)
            if [ -n "$ARTIFACT_INFO" ]; then
              RESOLVED_RUN_ID="${ARTIFACT_INFO%%$'\t'*}"
              RESOLVED_ARTIFACT="${ARTIFACT_INFO#*$'\t'}"
              case "$RESOLVED_ARTIFACT" in
                vulkan-prebuilt-*)
                  RUN_ID="$RESOLVED_RUN_ID"
                  ARTIFACT="$RESOLVED_ARTIFACT"
                  echo "resolved artifact $ARTIFACT_ID to run $RUN_ID"
                  ;;
              esac
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "no vulkan-prebuilt-* artifact found for input $VULKAN_INPUT"
            echo "Use the Prebuild Vulkan run ID from /actions/runs/<run_id>, or paste the vulkan-prebuilt artifact URL."
            exit 1
          fi
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT" \
            --dir vulkan-archive
          tar -xJf vulkan-archive/vulkan-prebuilt.tar.xz
          mkdir -p dist-platform
          cp -R prebuilt-vulkan/MoltenVK.xcframework dist-platform/

      - name: Download platform slices
        env:
          PAIRS: ${{ inputs.slice_run_ids }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p slice-archives

          artifact_for_run() {
            prefix="$1"
            run_id="$2"
            gh api "repos/$REPO/actions/runs/$run_id/artifacts?per_page=100" \
              --jq '.artifacts[].name' 2>/dev/null \
              | while IFS= read -r name; do
                  case "$name" in
                    "$prefix"*)
                      printf '%s\n' "$name"
                      break
                      ;;
                  esac
                done
          }

          IFS=',' read -ra ENTRIES <<< "$PAIRS"
          for entry in "${ENTRIES[@]}"; do
            entry="${entry// /}"
            platform="${entry%%:*}"
            run_id="${entry##*:}"
            artifact=$(artifact_for_run "slice-${platform}-" "$run_id" || true)
            if [ -z "$artifact" ]; then
              echo "no slice-${platform}-* artifact found on run $run_id"
              exit 1
            fi
            echo "==> downloading $artifact from run $run_id"
            gh run download "$run_id" \
              --repo "$REPO" \
              --name "$artifact" \
              --dir "slice-archives/${platform}"
          done
          ls -R slice-archives

      - name: Unpack platform slices
        run: |
          set -e
          for tar in slice-archives/*/slice-*.tar.xz; do
            tar -xJf "$tar" -C dist-platform
          done
          ls dist-platform

      - name: Assemble xcframeworks
        run: swift run --package-path . MPVKitBuilder assemble

      - name: Resolve release metadata
        env:
          PAIRS: ${{ inputs.slice_run_ids }}
          PACKAGE_PLATFORMS_INPUT: ${{ inputs.package_platforms }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          stamp=$(TZ=Asia/Shanghai date +%Y%m%d-%H%M)
          if [ -n "$TAG_INPUT" ]; then
            release_tag="$TAG_INPUT"
            safe_tag="${TAG_INPUT//\//-}"
            safe_tag="${safe_tag// /-}"
            bundle_name="MPVKit-${safe_tag}-${stamp}"
          else
            release_tag="MPVKit-${stamp}"
            bundle_name="$release_tag"
          fi

          if [ -n "$PACKAGE_PLATFORMS_INPUT" ]; then
            package_platforms="${PACKAGE_PLATFORMS_INPUT// /}"
          else
            platforms=()
            IFS=',' read -ra ENTRIES <<< "$PAIRS"
            for entry in "${ENTRIES[@]}"; do
              entry="${entry// /}"
              if [ -z "$entry" ]; then
                continue
              fi
              platforms+=("${entry%%:*}")
            done
            package_platforms=$(IFS=','; echo "${platforms[*]}")
          fi

          if [ -z "$package_platforms" ]; then
            echo "no package platforms resolved"
            exit 1
          fi

          echo "RELEASE_STAMP=$stamp" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "BUNDLE_NAME=$bundle_name" >> "$GITHUB_ENV"
          echo "PACKAGE_PLATFORMS=$package_platforms" >> "$GITHUB_ENV"
          echo "release tag: $release_tag"
          echo "bundle name: $bundle_name"
          echo "package platforms: $package_platforms"

      - name: Generate Package.swift
        run: swift run --package-path . MPVKitBuilder package "package-platforms=$PACKAGE_PLATFORMS"

      - name: Validate generated Package.swift
        run: swift package dump-package --package-path dist

      - name: Show dist
        run: |
          ls -lh dist
          du -sh dist/*.xcframework | sort -h

      - name: Pack final bundle
        run: |
          tar -cJf "$BUNDLE_NAME.tar.xz" -C dist .
          ls -lh "$BUNDLE_NAME.tar.xz"

      - name: Upload aggregated artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: ${{ env.BUNDLE_NAME }}.tar.xz
          retention-days: 7

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: ${{ env.BUNDLE_NAME }}.tar.xz
          generate_release_notes: true
