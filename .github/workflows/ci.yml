name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: swift build + dry-run
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Show SDKs
        run: |
          xcodebuild -showsdks | sed -n '1,80p'
          xcrun --sdk xros --show-sdk-path
          xcrun --sdk appletvos --show-sdk-path

      - name: swift build
        run: swift build

      - name: dry-run ios
        run: swift run --package-path . MPVKitBuilder dry-run platform=ios split-platform skip=libdovi

      - name: dry-run macos
        run: swift run --package-path . MPVKitBuilder dry-run platform=macos split-platform skip=libdovi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: .build/reports
          retention-days: 3
