name: Verify libdovi

on:
  workflow_dispatch:

concurrency:
  group: verify-libdovi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  libdovi:
    name: libdovi ${{ matrix.platform }}
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos
          - ios
          - isimulator
          - tvos
          - tvsimulator
          - xros
          - xrsimulator
          - maccatalyst

    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Free disk (drop unused Xcodes)
        run: |
          SELECTED=$(xcode-select -p)
          KEEP=$(dirname "$(dirname "$SELECTED")")
          echo "keeping $KEEP"
          for app in /Applications/Xcode*.app; do
            if [ "$app" != "$KEEP" ]; then
              echo "removing $app"
              sudo rm -rf "$app"
            fi
          done

      - name: Export selected Xcode
        run: |
          DEVELOPER_DIR=$(xcode-select -p)
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version

      - name: First launch
        run: |
          sudo xcodebuild -runFirstLaunch
          xcodebuild -checkFirstLaunchStatus
          xcrun --kill-cache

      - name: Probe SDKs
        run: |
          xcodebuild -showsdks
          for sdk in iphoneos iphonesimulator appletvos appletvsimulator xros xrsimulator; do
            echo "== $sdk =="
            xcrun --no-cache --sdk "$sdk" --show-sdk-path
            xcrun --no-cache --sdk "$sdk" --show-sdk-platform-path
          done

      - name: Ensure selected platform components
        run: |
          case "${{ matrix.platform }}" in
            ios|isimulator)
              PLATFORM=iOS
              SDKS="iphoneos iphonesimulator"
              ;;
            tvos|tvsimulator)
              PLATFORM=tvOS
              SDKS="appletvos appletvsimulator"
              ;;
            xros|xrsimulator)
              PLATFORM=visionOS
              SDKS="xros xrsimulator"
              ;;
            *)
              echo "No downloadable platform component needed for ${{ matrix.platform }}"
              exit 0
              ;;
          esac

          NEED_DOWNLOAD=0
          for sdk in $SDKS; do
            echo "checking $sdk"
            xcrun --no-cache --sdk "$sdk" --show-sdk-path || NEED_DOWNLOAD=1
            xcrun --no-cache --sdk "$sdk" --show-sdk-platform-path || NEED_DOWNLOAD=1
          done

          if [ "$NEED_DOWNLOAD" -eq 1 ]; then
            echo "Downloading $PLATFORM platform components"
            xcrun --kill-cache
            xcodebuild -downloadPlatform "$PLATFORM"
            xcrun --kill-cache
          fi

      - name: Install build tools
        run: |
          brew update
          brew install cmake pkg-config

      - name: Install Rust build tools
        run: |
          set -euo pipefail
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios \
            aarch64-apple-ios-macabi \
            x86_64-apple-ios-macabi \
            aarch64-apple-tvos \
            aarch64-apple-tvos-sim \
            aarch64-apple-visionos \
            aarch64-apple-visionos-sim

          if ! command -v cargo-cinstall >/dev/null 2>&1; then
            cargo install cargo-c --locked
          fi

          rustc -vV
          cargo --version
          rustup --version
          cargo cinstall --version

      - name: Build libdovi
        run: |
          set -euo pipefail
          swift run --package-path . MPVKitBuilder build \
            only=libdovi \
            platform=${{ matrix.platform }} \
            split-platform \
            clean-after-lib \
            disable-package \
            force=libdovi \
            verbose

      - name: Verify output
        run: |
          set -euo pipefail
          FRAMEWORK="dist-platform/${{ matrix.platform }}/Libdovi.framework"
          test -d "$FRAMEWORK"
          test -f "$FRAMEWORK/Libdovi"
          test -d "$FRAMEWORK/Headers"
          find "$FRAMEWORK" -maxdepth 3 -type f | sort
          lipo -info "$FRAMEWORK/Libdovi"

      - name: Disk after build
        if: always()
        run: |
          df -h
          du -sh build dist dist-platform .build/reports 2>/dev/null || true

      - name: Upload libdovi framework
        uses: actions/upload-artifact@v4
        with:
          name: libdovi-${{ matrix.platform }}-${{ github.run_number }}
          path: dist-platform/${{ matrix.platform }}/Libdovi.framework
          retention-days: 7

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libdovi-reports-${{ matrix.platform }}-${{ github.run_number }}
          path: .build/reports
          retention-days: 7
